---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

dotenv: [".env"]

vars:
  DOCKER_COMPOSE: docker compose --project-directory . -f docker-compose.yaml
  SERVICE: lm-studio

env:
  COMPOSE_BAKE: true

tasks:
  image:build:
    desc: Build the LM Studio Docker image.
    silent: true
    cmds:
      - "{{.DOCKER_COMPOSE}} build {{.SERVICE}}"

  image:push:
    desc: Build and push the LM Studio Docker image.
    silent: true
    cmds:
      - task: image:build
      - "{{.DOCKER_COMPOSE}} push {{.SERVICE}}"

  image:pull:
    desc: Pull the published LM Studio Docker image.
    silent: true
    cmds:
      - "{{.DOCKER_COMPOSE}} pull {{.SERVICE}}"

  image:publish:
    desc: Build, tag, and push the LM Studio Docker image.
    preconditions:
      - sh: test -n "${LM_STUDIO_VERSION:-}"
        msg: LM_STUDIO_VERSION is required, e.g. LM_STUDIO_VERSION=1.2.3 task image:publish
    vars:
      VERSION: "{{.LM_STUDIO_VERSION}}"
    cmds:
      - task: image:build
      - docker image tag ghcr.io/psauxwwf/docker-lm-studio:latest ghcr.io/psauxwwf/docker-lm-studio:{{.VERSION}}
      - docker push ghcr.io/psauxwwf/docker-lm-studio:latest
      - docker push ghcr.io/psauxwwf/docker-lm-studio:{{.VERSION}}

  release:create:
    desc: Create a GitHub Release for the requested version.
    preconditions:
      - sh: test -n "${LM_STUDIO_VERSION:-}"
        msg: LM_STUDIO_VERSION is required, e.g. LM_STUDIO_VERSION=1.2.3 task release:create
    vars:
      VERSION: "{{.LM_STUDIO_VERSION}}"
    cmds:
      - >-
        gh release create "v{{.VERSION}}" --target "$(git rev-parse HEAD)" --title "v{{.VERSION}}" --generate-notes

  up:cpu:
    desc: Start the CPU container.
    silent: true
    cmds:
      - "{{.DOCKER_COMPOSE}} up -d {{.SERVICE}}"

  up:nvidia:
    desc: Start the NVIDIA container.
    silent: true
    cmds:
      - "{{.DOCKER_COMPOSE}} -f docker-compose.nvidia.yaml up -d {{.SERVICE}}"

  up:amd:
    desc: Start the AMD container.
    silent: true
    cmds:
      - "{{.DOCKER_COMPOSE}} -f docker-compose.amd.yaml up -d {{.SERVICE}}"

  up:intel:
    desc: Start the Intel container.
    silent: true
    cmds:
      - "{{.DOCKER_COMPOSE}} -f docker-compose.intel.yaml up -d {{.SERVICE}}"
