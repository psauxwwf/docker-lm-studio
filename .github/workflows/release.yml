name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "LM Studio image version (e.g. 0.0.19-2)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Publish image
        run: task image:publish
        env:
          LM_STUDIO_VERSION: ${{ inputs.version }}

      - name: Create GitHub release
        run: task release:create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LM_STUDIO_VERSION: ${{ inputs.version }}
